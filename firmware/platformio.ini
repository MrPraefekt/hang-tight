[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino

build_src_filter = +<*> -<main_demo.cpp>

; Libraries
lib_deps =
    HX711
    WebSockets
    ArduinoJson

; Upload Configuration
upload_speed = 921600
monitor_speed = 115200

; Memory optimization
board_build.partitions = huge_app.csv

; ── Demo build (no HX711 needed) ─────────────────────────
[env:esp32_demo]
platform = espressif32
board = esp32dev
framework = arduino

build_src_filter = +<*> -<main.cpp>

lib_deps =
    WebSockets
    ArduinoJson

upload_speed = 921600
monitor_speed = 115200
board_build.partitions = huge_app.csv
